<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B2818"/>
      <stop offset="100%" stop-color="#1B4D32"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#5CC98A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- rising trend line -->
  <polyline points="70,150 130,120 190,135 250,90 310,60"
            fill="none" stroke="#5CC98A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="310" cy="60" r="7" fill="#D4AF37"/>

  <!-- small bar chart -->
  <g transform="translate(55,155)">
    <rect x="0" y="30" width="16" height="35" fill="#5CC98A" opacity="0.7"/>
    <rect x="22" y="15" width="16" height="50" fill="#5CC98A" opacity="0.85"/>
    <rect x="44" y="0" width="16" height="65" fill="#D4AF37"/>
  </g>

  <!-- bar chart accent right side -->
  <g transform="translate(950,105)">
    <rect x="0" y="45" width="18" height="45" fill="#5CC98A"/>
    <rect x="26" y="25" width="18" height="65" fill="#D4AF37"/>
    <rect x="52" y="55" width="18" height="35" fill="#5CC98A"/>
    <rect x="78" y="5" width="18" height="85" fill="#D4AF37"/>
  </g>

  <text x="220" y="150" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#FFFFFF">
    Mallcom India
  </text>
  <text x="220" y="200" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#D4AF37">
    Financial Performance Analysis
  </text>
  <text x="220" y="235" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#BFE8CF">
    Power BI · DAX · 11-Year Trend &amp; Profitability Analysis
  </text>

  <rect x="0" y="252" width="1200" height="8" fill="url(#accent)"/>
</svg>
