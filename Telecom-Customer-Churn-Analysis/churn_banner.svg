<svg viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1F4D"/>
      <stop offset="100%" stop-color="#1A3B7A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E63946"/>
      <stop offset="100%" stop-color="#F2C811"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- signal tower icon -->
  <g transform="translate(90,60)" stroke="#F2C811" stroke-width="4" fill="none" stroke-linecap="round">
    <line x1="40" y1="20" x2="40" y2="140"/>
    <line x1="15" y1="60" x2="40" y2="20"/>
    <line x1="65" y1="60" x2="40" y2="20"/>
    <line x1="10" y1="90" x2="40" y2="55"/>
    <line x1="70" y1="90" x2="40" y2="55"/>
    <circle cx="40" cy="12" r="6" fill="#F2C811" stroke="none"/>
  </g>

  <!-- signal waves -->
  <g stroke="#E63946" stroke-width="4" fill="none" opacity="0.8">
    <path d="M 130 55 Q 160 40 130 25"/>
    <path d="M 145 65 Q 190 40 145 15"/>
  </g>

  <!-- bar chart accent -->
  <g transform="translate(950,110)">
    <rect x="0" y="40" width="18" height="50" fill="#4CC9F0"/>
    <rect x="26" y="20" width="18" height="70" fill="#E63946"/>
    <rect x="52" y="55" width="18" height="35" fill="#F2C811"/>
    <rect x="78" y="10" width="18" height="80" fill="#4CC9F0"/>
  </g>

  <text x="220" y="105" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#FFFFFF">
    Telecom Customer Churn
  </text>
  <text x="220" y="155" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700" fill="#F2C811">
    &amp; Revenue Risk Analysis
  </text>
  <text x="220" y="195" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#B8C7E8">
    Power BI · MySQL · Python · Data-Driven Retention Strategy
  </text>

  <rect x="0" y="252" width="1200" height="8" fill="url(#accent)"/>
</svg>
